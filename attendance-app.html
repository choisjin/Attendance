          <p className="reccard-reason">{r.reason}</p>
          <div className="reccard-meta">{r.kind==="ot"?<span>프로젝트 {project(r.projectId)?.name||"-"}</span>:<span>{fmtDur(r.minutes)} 사용</span>}<span>{r.status==="pending_pl"?"1차(PL)":"2차(스탭)"}</span></div>
          <div className="actions"><button className="btn small primary" onClick={()=>onDecide(r.kind,r.id,true)}>승인</button><button className="btn small danger" onClick={()=>onDecide(r.kind,r.id,false)}>반려</button></div>
        </div>
      ))}</div>
    </div>
  );
}

function Manage({data,persist,flash}){
  const [mq,setMq]=useState(""); const [mpage,setMpage]=useState(1); const PER=10;
  const [pname,setPname]=useState(""); const [ppl,setPpl]=useState(""); const [plg,setPlg]=useState("");
  const [memberModal,setMemberModal]=useState(null); // "add" | memberObj
  const [projPicker,setProjPicker]=useState(null);    // projectId
  const q=mq.trim().toLowerCase();
  const sortedMembers=[...data.members].sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  const filteredMembers=q?sortedMembers.filter(m=>(m.name||"").toLowerCase().includes(q)||(m.dept||"").toLowerCase().includes(q)||(m.email||"").toLowerCase().includes(q)||(m.phone||"").toLowerCase().includes(q)||(ROLE_LABEL[m.role]||"").toLowerCase().includes(q)):sortedMembers;
  const pageCount=Math.max(1,Math.ceil(filteredMembers.length/PER));
  const curPage=Math.min(mpage,pageCount);
  const pageMembers=filteredMembers.slice((curPage-1)*PER,curPage*PER);
  const saveMember=(form,id)=>{
    if(id){ persist({...data,members:data.members.map(m=>m.id===id?{...m,...form}:m)}); flash("정보를 수정했어요."); }
    else { persist({...data,members:[...data.members,{id:uid(),pw:"1",...form}]}); flash("인원을 추가했어요."); }
    setMemberModal(null);
  };
  const removeMember=(id)=>{ if(confirm("삭제할까요?"))persist({...data,members:data.members.filter(m=>m.id!==id),projects:data.projects.map(p=>({...p,memberIds:p.memberIds.filter(x=>x!==id)}))}); };
  const pls=data.members.filter(m=>m.role==="pl"); const lgs=data.members.filter(m=>m.role==="lg");
  const addProject=()=>{ if(!pname.trim())return; persist({...data,projects:[...data.projects,{id:uid(),name:pname.trim(),plId:ppl||pls[0]?.id||"",lgId:plg||lgs[0]?.id||"",memberIds:[]}]}); setPname(""); flash("프로젝트를 추가했어요."); };
  const toggleM=(pid,mid)=>persist({...data,projects:data.projects.map(p=>p.id===pid?{...p,memberIds:p.memberIds.includes(mid)?p.memberIds.filter(x=>x!==mid):[...p.memberIds,mid]}:p)});
  const setPl=(pid,plId)=>persist({...data,projects:data.projects.map(p=>p.id===pid?{...p,plId}:p)});
  const setLg=(pid,lgId)=>persist({...data,projects:data.projects.map(p=>p.id===pid?{...p,lgId}:p)});
  const removeProject=(pid)=>{ if(confirm("프로젝트를 삭제할까요?"))persist({...data,projects:data.projects.filter(p=>p.id!==pid)}); };
  const pickProj=projPicker?data.projects.find(p=>p.id===projPicker):null;
  return (
    <div className="stack">
      <section className="panel"><div className="panel-head"><h2 className="panel-title">팀원 {data.members.length}명</h2><button className="btn small primary" onClick={()=>setMemberModal("add")}>＋ 인원추가</button></div>
        <input className="input searchbox" value={mq} onChange={e=>{setMq(e.target.value);setMpage(1);}} placeholder="이름·부서·직책·메일·전화 검색" />
        {filteredMembers.length===0?<Empty>검색 결과가 없어요.</Empty>:(
          <ul className="list">{pageMembers.map(m=>(<li key={m.id} className="item"><div className="item-main"><span className="avatar">{m.name.slice(0,1)}</span><div style={{display:"flex",flexDirection:"column",lineHeight:1.35}}><strong>{m.name}{m.dept?<span className="dim" style={{fontWeight:400}}> · {m.dept}</span>:null}</strong>{(m.email||m.phone)&&<span className="dim" style={{fontSize:"11.5px"}}>{m.email||""}{m.email&&m.phone?" · ":""}{m.phone||""}</span>}</div></div><div className="item-main" style={{gap:6}}><span className={"rolepill r-"+m.role}>{ROLE_LABEL[m.role]||m.role}</span>{m.role!=="master"&&<button className="btn small ghost" onClick={()=>setMemberModal(m)}>수정</button>}{m.role!=="master"&&<button className="x" onClick={()=>removeMember(m.id)}>✕</button>}</div></li>))}</ul>
        )}
        {filteredMembers.length>0&&(
          <React.Fragment>
            <div className="pager">
              <button className="btn small ghost" disabled={curPage<=1} onClick={()=>setMpage(curPage-1)}>‹</button>
              {Array.from({length:pageCount},(_,i)=>i+1).map(n=>(<button key={n} className={"btn small "+(n===curPage?"primary":"ghost")} onClick={()=>setMpage(n)}>{n}</button>))}
              <button className="btn small ghost" disabled={curPage>=pageCount} onClick={()=>setMpage(curPage+1)}>›</button>
            </div>
            <p className="dim" style={{textAlign:"center",margin:"8px 0 0"}}>총 {filteredMembers.length}명 · {curPage}/{pageCount} 페이지</p>
          </React.Fragment>
        )}
      </section>
      <section className="panel"><h2 className="panel-title">프로젝트</h2><p className="panel-sub">여기서 지정한 PL(1차)·스탭(2차)이 추가근무·시간사용 승인자로 자동 적용됩니다.</p>
        <div className="form"><Field label="프로젝트명"><input className="input" value={pname} onChange={e=>setPname(e.target.value)} placeholder="프로젝트명" /></Field><Field label="PL (1차)"><select className="input" value={ppl} onChange={e=>setPpl(e.target.value)}><option value="">선택</option>{pls.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></Field><Field label="스탭 (2차)"><select className="input" value={plg} onChange={e=>setPlg(e.target.value)}><option value="">선택</option>{lgs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></Field></div>
        <div className="actions"><button className="btn primary" onClick={addProject}>프로젝트 추가</button></div>
        <div className="cards mt">{data.projects.map(p=>(
          <div key={p.id} className="reccard"><div className="reccard-top"><strong>{p.name}</strong><button className="x" onClick={()=>removeProject(p.id)}>✕</button></div>
            <div className="proj-pl"><span className="flabel">PL (1차)</span><select className="input mini" value={p.plId} onChange={e=>setPl(p.id,e.target.value)}>{pls.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select><span className="flabel">스탭 (2차)</span><select className="input mini" value={p.lgId||""} onChange={e=>setLg(p.id,e.target.value)}><option value="">선택</option>{lgs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
            <span className="flabel">소속 팀원 ({(p.memberIds||[]).length})</span>
            <div className="chips-pick">
              {(p.memberIds||[]).length===0&&<span className="dim">아직 없음</span>}
              {(p.memberIds||[]).map(id=>{ const m=data.members.find(x=>x.id===id); return m?(<span key={id} className="mchip on" style={{display:"inline-flex",alignItems:"center",gap:6}}>{m.name}<span onClick={()=>toggleM(p.id,id)} style={{cursor:"pointer"}}>✕</span></span>):null; })}
              <button className="mchip" onClick={()=>setProjPicker(p.id)}>＋ 인원추가</button>
            </div>
          </div>
        ))}</div>
      </section>
      {memberModal&&<MemberFormModal initial={memberModal==="add"?null:memberModal} onSave={(form)=>saveMember(form,memberModal==="add"?null:memberModal.id)} onClose={()=>setMemberModal(null)} />}
      {pickProj&&<ProjMemberPicker project={pickProj} members={data.members} projects={data.projects} onToggle={(mid)=>toggleM(pickProj.id,mid)} onClose={()=>setProjPicker(null)} />}
    </div>
  );
}

function MemberFormModal({initial,onSave,onClose}){
  const editing=!!initial;
  const [name,setName]=useState(initial?.name||"");
  const [role,setRole]=useState(initial?.role||"member");
  const [dept,setDept]=useState(initial?.dept||"");
  const [email,setEmail]=useState(initial?.email||"");
  const [phone,setPhone]=useState(initial?.phone||"");
  const save=()=>{ if(!name.trim())return alert("이름을 입력해 주세요."); onSave({name:name.trim(),role,dept:dept.trim(),email:email.trim(),phone:phone.trim()}); };
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-head"><h3>{editing?"인원 정보 수정":"인원 추가"}</h3><button className="x" onClick={onClose}>✕</button></div>
        <div className="form">
          <Field label="이름"><input className="input" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} placeholder="이름" /></Field>
          <Field label="직책"><select className="input" value={role} onChange={e=>setRole(e.target.value)}><option value="member">팀원</option><option value="partlead">파트장</option><option value="pl">PL</option><option value="lg">스탭</option></select></Field>
          <Field label="부서명"><input className="input" value={dept} onChange={e=>setDept(e.target.value)} placeholder="부서명" /></Field>
          <Field label="휴대전화"><input className="input" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000" /></Field>
          <Field label="메일주소" full><input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@linkgenesis.co.kr" autoComplete="off" /></Field>
        </div>
        <div className="actions"><button className="btn primary" onClick={save}>{editing?"저장":"추가"}</button><button className="btn ghost" onClick={onClose}>취소</button></div>
      </div>
    </div>
  );
}

function ProjMemberPicker({project,members,projects,onToggle,onClose}){
  const [q,setQ]=useState("");
  const inOther=new Set();
  projects.forEach(p=>{ if(p.id!==project.id)(p.memberIds||[]).forEach(id=>inOther.add(id)); });
  // 후보: 팀원 직책 + 다른 프로젝트에 속하지 않은 인원 (이 프로젝트 소속은 포함)
  const candidates=members.filter(m=>m.role==="member"&&!inOther.has(m.id)).sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  const qq=q.trim().toLowerCase();
  const list=qq?candidates.filter(m=>(m.name||"").toLowerCase().includes(qq)||(m.dept||"").toLowerCase().includes(qq)):candidates;
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-head"><h3>소속 인원 추가 — {project.name}</h3><button className="x" onClick={onClose}>✕</button></div>
        <p className="dim mb">다른 프로젝트에 속하지 않은 팀원만 표시됩니다. 클릭해서 소속/해제하세요.</p>
        <input className="input searchbox" value={q} onChange={e=>setQ(e.target.value)} placeholder="이름·부서 검색" />
        {list.length===0?<Empty>추가할 수 있는 팀원이 없어요.</Empty>:(
          <ul className="list" style={{maxHeight:"48vh",overflow:"auto"}}>
            {list.map(m=>{ const on=(project.memberIds||[]).includes(m.id); return (
              <li key={m.id} className="item" style={{cursor:"pointer"}} onClick={()=>onToggle(m.id)}>
                <div className="item-main"><span className="avatar">{m.name.slice(0,1)}</span><div style={{display:"flex",flexDirection:"column",lineHeight:1.35}}><strong>{m.name}{m.dept?<span className="dim" style={{fontWeight:400}}> · {m.dept}</span>:null}</strong></div></div>
                <span className={"chip "+(on?"s-ok":"s-done")}>{on?"✓ 소속":"추가"}</span>
              </li>
            ); })}
          </ul>
        )}
        <div className="actions"><button className="btn primary" onClick={onClose}>완료</button></div>
      </div>
    </div>
  );
}

function Field({label,children,full}){ return <label className={"field"+(full?" full":"")}><span className="flabel">{label}</span>{children}</label>; }
function Chip({status}){ const s=STATUS[status]||{label:status,cls:""}; return <span className={"chip "+s.cls}>{s.label}</span>; }
function Empty({children}){ return <div className="empty">{children}</div>; }
function MailModal({modal,onClose,flash}){
  const prevRef=React.useRef(null);
  // 일반 텍스트 복사 (제목/받는사람/참조) — 비보안(HTTP LAN)에서도 execCommand 폴백
  const copyText=async(text,label)=>{
    text=text==null?"":String(text);
    if(navigator.clipboard && window.isSecureContext){
      try{ await navigator.clipboard.writeText(text); flash(label+" 복사했어요."); return; }catch(e){}
    }
    try{
      const ta=document.createElement("textarea"); ta.value=text;
      ta.style.position="fixed"; ta.style.left="-9999px"; ta.style.top="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok=document.execCommand("copy"); document.body.removeChild(ta);
      if(ok){ flash(label+" 복사했어요."); return; }
    }catch(e){}
    flash("복사 실패 — 값을 직접 선택해 복사해 주세요.");
  };
  // 본문 복사 (서식 포함)
  const copyBody=async()=>{
    const html=modal.html, text=modal.text||"";
    if(navigator.clipboard && window.isSecureContext){
      try{
        if(html && window.ClipboardItem){
          await navigator.clipboard.write([new ClipboardItem({"text/html":new Blob([html],{type:"text/html"}),"text/plain":new Blob([text],{type:"text/plain"})})]);
        } else { await navigator.clipboard.writeText(text); }
        flash(html?"본문을 복사했어요 (서식 포함).":"복사했어요."); return;
      }catch(e){}
    }
    try{
      let ok=false;
      if(html && prevRef.current){
        const range=document.createRange(); range.selectNodeContents(prevRef.current);
        const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        ok=document.execCommand("copy"); sel.removeAllRanges();
      }else{
        const ta=document.createElement("textarea"); ta.value=text;
        ta.style.position="fixed"; ta.style.left="-9999px"; ta.style.top="0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        ok=document.execCommand("copy"); document.body.removeChild(ta);
      }
      if(ok){ flash(html?"본문을 복사했어요 (서식 포함).":"복사했어요."); return; }
    }catch(e){}
    flash("복사 실패 — 아래 본문을 직접 드래그해 복사해 주세요.");
  };
  const metaRow=(lbl,val,tag)=> val?(
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span className="flabel" style={{flex:"0 0 60px"}}>{lbl}</span>
      <span className="dim" style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--ink)",userSelect:"text"}} title={val}>{val}</span>
      <button className="btn small ghost" style={{flexShrink:0,padding:"5px 12px"}} onClick={()=>copyText(val,tag)}>복사</button>
    </div>
  ):null;
  return (<div className="backdrop" onClick={onClose}><div className={"modal"+(modal.html?" wide":"")} onClick={e=>e.stopPropagation()}>
    <div className="modal-head"><h3>메일 초안</h3><button className="x" onClick={onClose}>✕</button></div>
    <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
      {metaRow("제목",modal.title,"제목을")}
      {metaRow("받는 사람",modal.to,"받는사람을")}
      {metaRow("참조",modal.cc,"참조를")}
    </div>
    {modal.html?<div className="mailprev" ref={prevRef} dangerouslySetInnerHTML={{__html:modal.html}} />:<textarea className="mail" readOnly value={modal.text} />}
    <div className="actions"><button className="btn primary" onClick={copyBody}>{modal.html?"본문 복사 (서식 포함)":"본문 복사"}</button><button className="btn ghost" onClick={onClose}>닫기</button></div>
  </div></div>);
}
function mailRequest(f,member,proj){ const pl=member(f.plId)?.name||"PL",lg=member(f.lgId)?.name||"스탭",pn=proj(f.projectId)?.name||"(프로젝트)";
  return {title:"추가근무 신청 메일",text:"받는 사람: "+lg+" (스탭)\n참조: "+pl+" (PL)\n제목: [추가근무 신청] "+f.date+" / "+pn+"\n\n안녕하세요.\n아래와 같이 추가근무를 신청합니다.\n\n- 일자: "+f.date+"\n- 프로젝트: "+pn+"\n- 사유: "+(f.reason||"(사유)")+"\n- PL 협의: "+pl+" (사전 협의 완료)\n\n검토 후 승인 부탁드립니다.\n감사합니다."}; }
function mailStart(o,proj){ return {title:"추가근무 시작 메일",text:"제목: [추가근무 시작] "+o.date+" / "+(proj(o.projectId)?.name||"")+"\n\n추가근무를 시작합니다.\n- 시작 시각: "+(o.start||"(시각)")}; }
function mailEnd(o,proj){ return {title:"추가근무 종료 메일",text:"제목: [추가근무 종료] "+o.date+" / "+(proj(o.projectId)?.name||"")+"\n\n추가근무를 종료합니다.\n- 시작: "+(o.start||"-")+"\n- 종료: "+(o.end||"-")+"\n- 인정 추가근무: "+fmtDur(o.totalMin)+" (17:30 이후 기준)"}; }
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
