<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
:root{

*{box-sizing:border-box} html,body{margin:0;height:100%;}
#root{height:100%;}
body{font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;}

.brand-mark{font-size:21px;font-weight:800;letter-spacing:-.02em;}

.who{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}

.loginbox{display:flex;flex-direction:column;gap:8px;padding:14px 18px;}

.tab:hover{color:var(--ink);}

.badge{background:var(--rust);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:1px 7px;}
.app-root{display:flex;flex-direction:column;height:100%;}
.main{margin:0 auto;padding:22px 28px 28px;flex:1;display:flex;flex-direction:column;min-height:0;width:100%;}

.sw-otun{background:var(--amber);} .sw-otpart{background:var(--amber-soft);border:1px solid var(--amber);} .sw-otdone{background:var(--line-2);border:1px solid var(--line);}

.form{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;} .field.full{grid-column:1/-1;}
.flabel{font-size:12.5px;color:var(--soft);font-weight:600;}
.input{font-family:inherit;font-size:14px;color:var(--ink);padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);width:100%;}

.ta{min-height:70px;resize:vertical;}

.btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}

.proj-pl{display:flex;align-items:center;gap:8px;margin:10px 0;flex-wrap:wrap;}
.chip{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.s-wait{background:var(--amber-soft);color:#8a5e1c;} .s-ok{background:var(--teal-soft);color:var(--teal);}
.s-no{background:var(--rust-soft);color:var(--rust);} .s-done{background:#E7EAF0;color:var(--ink);}
.s-ot{background:var(--amber-soft);color:#8a5e1c;}
.list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;}
.item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line-2);}
.item:last-child{border-bottom:none;}
.item-main{display:flex;align-items:center;gap:9px;font-size:13.5px;}
.tag{font-size:11px;font-weight:700;color:var(--amber);background:var(--amber-soft);padding:2px 8px;border-radius:6px;}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;}
.x{border:none;background:none;color:var(--soft);cursor:pointer;font-size:13px;padding:6px;} .x:hover{color:var(--rust);}
.picklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;}
.pick{font-family:inherit;text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;display:flex;flex-direction:column;gap:3px;}
.pick:hover{border-color:var(--amber);} .pick.on{border-color:var(--amber);background:var(--amber-soft);}
.pick-date{font-size:11px;color:var(--soft);} .pick-amt{font-size:17px;font-weight:800;} .pick-proj{font-size:11.5px;color:var(--soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rec{font-size:9px;font-weight:700;color:#fff;background:var(--teal);border-radius:8px;padding:0 6px;margin-left:6px;}
.warnline{font-size:12px;color:#8a5e1c;background:var(--amber-soft);border:1px solid var(--amber);border-radius:8px;padding:8px 11px;margin-top:12px;}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.seg button{font-family:inherit;font-size:13.5px;font-weight:600;padding:9px 18px;border:none;background:var(--card);color:var(--soft);cursor:pointer;}
.seg button.on{background:var(--ink);color:#fff;} .seg button:disabled{color:#c2bdb1;cursor:not-allowed;}
.chips-pick{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px;}
.mchip{font-family:inherit;font-size:12.5px;padding:6px 12px;border:1px solid var(--line);border-radius:20px;background:var(--card);cursor:pointer;}
.mchip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.big-balance{font-size:26px;font-weight:800;color:var(--amber);} .big-balance.sm{font-size:22px;}
.note{background:var(--paper);border:1px solid var(--line-2);border-radius:12px;padding:13px 16px;margin-bottom:16px;}
.note strong{font-size:13px;} .note ul{margin:8px 0 0;padding-left:18px;} .note li{font-size:12.5px;color:var(--soft);line-height:1.7;}
.empty{padding:24px 18px;text-align:center;color:var(--soft);font-size:13.5px;background:var(--paper);border:1px dashed var(--line);border-radius:12px;line-height:1.6;}
.backdrop{position:fixed;inset:0;background:rgba(28,37,54,.45);display:grid;place-items:center;padding:18px;z-index:50;}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:520px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:88vh;overflow:auto;}
.modal.wide{max-width:680px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;} .modal-head h3{margin:0;font-size:16px;}
.mail{width:100%;min-height:230px;font-family:Menlo,monospace;font-size:12.5px;line-height:1.6;padding:13px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);resize:vertical;white-space:pre-wrap;}
.mailprev{border:1px solid var(--line);border-radius:10px;padding:14px;background:#fff;max-height:52vh;overflow:auto;user-select:text;}

<div id="root"><div class="boot">불러오는 중…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ── 공유 데이터 저장소 ──
//   att2:data → 서버(/api/data)에 공유 저장 (모든 사용자가 같은 데이터, 서버 재시작에도 유지).
//              서버에 못 붙으면 localStorage로 폴백(file:// 단독 실행 시).
//   그 외 키(att2:auth, att2:gw:*) → 기기 로컬(localStorage)에만 저장.
const mem = {};
const DATA_API = "/api/data";
let _dataRev = 0;             // 서버 데이터 리비전 (폴링 비교용)
let _serverOk = false;        // 서버 사용 가능 여부
async function sGet(k){
  if(k==="att2:data"){
    try{
      const r=await fetch(DATA_API,{cache:"no-store"});
      if(r.ok){ const j=await r.json(); if(j&&j.ok){ _serverOk=true; _dataRev=j.rev||0; return j.data!=null?{value:JSON.stringify(j.data)}:null; } }
    }catch(e){ _serverOk=false; }
    try { const v = localStorage.getItem(k); return v==null?null:{value:v}; } catch(e){}
    return mem[k]!=null ? {value:mem[k]} : null;
  }
  try { const v = localStorage.getItem(k); return v==null?null:{value:v}; } catch(e){}
  return mem[k]!=null ? {value:mem[k]} : null;
}
async function sSet(k,v){
  if(k==="att2:data"){
    try{
      const r=await fetch(DATA_API,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:JSON.parse(v)})});
      if(r.ok){ const j=await r.json(); _serverOk=true; if(j&&j.rev) _dataRev=j.rev; }
    }catch(e){ _serverOk=false; }
    try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } // 로컬 백업
    return;
  }
  try { localStorage.setItem(k,v); return; } catch(e){}
  mem[k]=v;
}
async function sGetLocal(k){ try{ const v=localStorage.getItem(k); return v==null?null:{value:v}; }catch(e){ return mem[k]!=null?{value:mem[k]}:null; } }
async function sSetLocal(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }

// ── 그룹웨어 연동: 자격증명은 기기 로컬에만 저장 (공유 데이터에 비밀번호를 넣지 않음) ──
//   싱크 API 기본 주소 = 페이지를 서빙한 서버(같은 출처). file://로 열면 localhost로 폴백.
const DEFAULT_GW_API=(typeof location!=="undefined"&&location.protocol&&location.protocol.indexOf("http")===0)?location.origin:"http://localhost:3939";
async function gwCredGet(memberId){ const r=await sGetLocal("att2:gw:"+memberId); if(r&&r.value){ try{ return JSON.parse(r.value); }catch(e){} } return {gwId:"",gwPw:""}; }
async function gwCredSet(memberId,obj){ await sSetLocal("att2:gw:"+memberId, JSON.stringify(obj)); }
async function gwApiGet(){ const r=await sGetLocal("att2:gwapi"); return (r&&r.value)||DEFAULT_GW_API; }

// 최근 N개월 "YYYY-MM" 목록 (현재월 우선)

// 연장근무 계획/결과 보고 메일(HTML+텍스트) 생성
function buildReportMail({kind,project,date,to,cc,reporter,rows}){
  const ymd=String(date).replace(/-/g,"/");
  const kindLabel=kind==="result"?"결과":"계획";
  const subject="[보고] "+project.name+" 프로젝트 연장 근무 "+kindLabel+" 보고 ("+ymd+")";
  const reporterLine="링크제니시스 "+reporter.name+(reporter.title?(" "+reporter.title):"")+"입니다.";
  const showLeave=kind==="result";
  const br=(s)=>escHtml(s).replace(/\n/g,"<br>");
  const TH='style="border:1px solid #555;padding:6px 12px;background:#e8efe0;font-weight:700;text-align:center;"';
  const TD='style="border:1px solid #555;padding:6px 12px;vertical-align:middle;"';
  const TC='style="border:1px solid #555;padding:6px 12px;vertical-align:middle;text-align:center;"';
  let head="<th "+TH+">프로젝트</th><th "+TH+">담당자</th><th "+TH+">연장근무 사유</th>"+(showLeave?("<th "+TH+">퇴근 시간</th>"):"")+"<th "+TH+">비고</th>";
  let bodyRows="";
  rows.forEach((r,i)=>{
    bodyRows+="<tr>";
    if(i===0) bodyRows+="<td "+TC+" rowspan=\""+rows.length+"\">"+escHtml(project.name)+"</td>";
    bodyRows+="<td "+TC+">"+escHtml(r.name)+"</td>";
    bodyRows+="<td "+TD+">"+br(r.reason)+"</td>";
    if(showLeave) bodyRows+="<td "+TC+">"+escHtml(r.leave||"")+"</td>";
    bodyRows+="<td "+TD+"></td>";
    bodyRows+="</tr>";
  });
  const table="<table style=\"border-collapse:collapse;font-size:13px;\"><thead><tr>"+head+"</tr></thead><tbody>"+bodyRows+"</tbody></table>";
  const html="<div style=\"font-family:'Malgun Gothic',sans-serif;font-size:13px;color:#1c2536;line-height:1.6;\">"
    +"<p>안녕하십니까<br>"+escHtml(reporterLine)+"</p>"
    +"<p>"+escHtml(project.name)+" 연장 근무 "+kindLabel+" 보고 드립니다.</p>"
    +table
    +"<p>이상입니다.<br>감사합니다.</p>"
    +"</div>";
  const tl=[];
  tl.push("안녕하십니까"); tl.push(reporterLine); tl.push("");
  tl.push(project.name+" 연장 근무 "+kindLabel+" 보고 드립니다."); tl.push("");
  rows.forEach(r=>{ tl.push("· "+r.name+(showLeave&&r.leave?(" (퇴근 "+r.leave+")"):"")+" : "+String(r.reason||"").replace(/\n/g," / ")); });
  tl.push(""); tl.push("이상입니다."); tl.push("감사합니다.");
  return {title:subject, to, cc, html, text:tl.join("\n")};
}

// 근무조정(퇴근/출근) 보고 메일(HTML+텍스트) 생성 — 이미지 양식
function buildAdjustMail({reporter,title,teamTag,kind,reason,y,mo,d,hh,mm,etc,to,cc}){
  const pad=(n)=>String(n).padStart(2,"0");
  const yy=String(y).slice(2);
  const subject="["+teamTag+"] "+reporter.name+" "+kind+" 근무조정 보고 ("+yy+"."+pad(mo)+"."+pad(d)+")";
  const reporterLine="링크제니시스 "+reporter.name+(title?(" "+title):"")+" 입니다.";
  const dtLine=y+"년 "+pad(mo)+"월 "+pad(d)+"일 "+pad(hh)+"시 "+pad(mm)+"분";
  const items=[["조정 인원",reporter.name],["조정 사유",reason||""],["조정 일시",dtLine],["기타",etc||""]];
  const liHtml=items.map(([k,v])=>"-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"+escHtml(k)+" : "+escHtml(v)).join("<br>");
  const html="<div style=\"font-family:'Malgun Gothic',sans-serif;font-size:13px;color:#1c2536;line-height:1.7;\">"
    +"<p>안녕하세요<br>"+escHtml(reporterLine)+"</p>"
    +"<p>아래와 같은 사유로 "+escHtml(kind)+" 근무 조정 신청합니다.</p>"
    +"<p>"+liHtml+"</p>"
    +"<p>이상입니다.<br>감사합니다.</p>"
    +"</div>";
  const tl=["안녕하세요",reporterLine,"","아래와 같은 사유로 "+kind+" 근무 조정 신청합니다.",""];
  items.forEach(([k,v])=>tl.push("-\t"+k+" : "+v));
  tl.push("","이상입니다.","감사합니다.");
  return {title:subject, to, cc, html, text:tl.join("\n")};
}

const BASE=17*60+30, HALF=240, WD=["일","월","화","수","목","금","토"];

const toMin=(t)=>{ if(!t||!t.includes(":"))return null; const [h,m]=t.split(":").map(Number); return Number.isNaN(h)||Number.isNaN(m)?null:h*60+m; };
const fmtDur=(min)=>{ if(min==null)return"-"; const h=Math.floor(min/60),m=min%60; if(h&&m)return h+"시간 "+m+"분"; if(h)return h+"시간"; return m+"분"; };
const calcOvertime=(s,e)=>{ const a=toMin(s),b=toMin(e); if(a==null||b==null)return 0; return Math.max(0,b-Math.max(BASE,a)); };

  ver:DATA_VER,
  members:[
    {id:"admin",name:"admin",role:"master",pw:"admin",dept:"",email:"",phone:""},
    ...ROSTER.map((p,i)=>({id:"u"+(i+1),name:p.name,role:"member",pw:"1",dept:p.dept,email:p.email,phone:p.phone})),
  ],
  projects:[],

  late:[],
  early:[],

});

function App(){
  const [loading,setLoading]=useState(true);
  const [data,setData]=useState(SEED());
  const [authId,setAuthId]=useState(null);
  const [manageOpen,setManageOpen]=useState(false);
  const [profileOpen,setProfileOpen]=useState(false);
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState("");

  useEffect(()=>{ (async()=>{
    const d=await sGet("att2:data");
    let loaded=null;
    if(d&&d.value){ try{ loaded=JSON.parse(d.value); }catch(e){} }
    // 인명록 반영: 구버전(임시 인원) 데이터는 실제 인명록 SEED로 교체
    if(!loaded || loaded.ver!==DATA_VER) loaded=SEED();
    // 마스터 계정(admin) 보장 (방어)
    if(!loaded.members.some(m=>m.id==="admin")) loaded.members=[{id:"admin",name:"admin",role:"master",pw:"admin",dept:"",email:"",phone:""},...loaded.members];
    if(!Array.isArray(loaded.early)) loaded.early=[]; // 조퇴 내역 (구버전 데이터 보강)
    if(!Array.isArray(loaded.otReports)) loaded.otReports=[]; // 연장근무 보고 사유 (구버전 보강)
    setData(loaded); await sSet("att2:data",JSON.stringify(loaded));
    const a=await sGetLocal("att2:auth"); if(a&&a.value) setAuthId(a.value);
    setLoading(false);
  })(); },[]);

  // 다른 사용자의 변경을 주기적으로 반영 (서버 공유 데이터)
  useEffect(()=>{ if(loading) return;
    const iv=setInterval(async()=>{
      try{ const r=await fetch(DATA_API,{cache:"no-store"}); if(!r.ok)return; const j=await r.json();
        if(j&&j.ok&&j.data&&(j.rev||0)!==_dataRev){ _dataRev=j.rev||0; setData(j.data); } }catch(e){}
    },5000);
    return ()=>clearInterval(iv);
  },[loading]);

  const persist=(next)=>{ setData(next); sSet("att2:data",JSON.stringify(next)); };
  const login=(id)=>{ setAuthId(id); sSetLocal("att2:auth",id); };
  const logout=()=>{ setAuthId(null); sSetLocal("att2:auth",""); setManageOpen(false); setProfileOpen(false); };
  const flash=(m)=>{ setToast(m); setTimeout(()=>setToast(""),2200); };
  const member=(id)=>data.members.find(x=>x.id===id);
  const updateMember=(id,patch)=>persist({...data,members:data.members.map(m=>m.id===id?{...m,...patch}:m)});

  const remainingOf=(otId)=>{ const ot=data.overtime.find(o=>o.id===otId); if(!ot||ot.status!=="completed")return 0;
    const used=data.usage.filter(u=>u.sourceId===otId&&u.status!=="rejected").reduce((a,u)=>a+u.minutes,0); return Math.max(0,ot.totalMin-used); };

  if(loading) return <div className="boot">불러오는 중…</div>;
  if(!authId||!member(authId)) return <Login members={data.members} onLogin={login} />;

  const meUser=member(authId);
  const visibleIds=(()=>{
    if(meUser.role==="lg"||meUser.role==="master") return data.members.map(m=>m.id);
    if(meUser.role==="partlead"){ const ids=new Set([meUser.id]); if(meUser.dept) data.members.forEach(m=>{ if(m.dept===meUser.dept) ids.add(m.id); }); return [...ids]; }
    if(meUser.role==="pl"){ const led=data.projects.filter(p=>p.plId===meUser.id); const ids=new Set([meUser.id]); led.forEach(p=>p.memberIds.forEach(id=>ids.add(id))); return [...ids]; }
    return [meUser.id];
  })();
  const scopeLabel=(meUser.role==="lg"||meUser.role==="master")?"전체 인원":meUser.role==="partlead"?("같은 파트"+(meUser.dept?(" ("+meUser.dept+")"):"")):meUser.role==="pl"?"내 프로젝트 팀원 + 본인":"본인";
  const myBlocks=data.overtime.filter(o=>o.requesterId===authId&&o.status==="completed").map(o=>({...o,remaining:remainingOf(o.id)})).sort((a,b)=>a.date<b.date?1:-1);

  const addOvertime=(f)=>{ persist({...data,overtime:[{id:uid(),requesterId:authId,projectId:f.projectId,date:f.date,reason:f.reason,plId:f.plId,lgId:f.lgId,start:f.start,end:f.end,totalMin:f.totalMin,status:"pending_pl"},...data.overtime]}); flash("추가근무 신청을 등록했어요."); };
  const decide=(kind,id,ok)=>{ const key=kind==="ot"?"overtime":"usage";
    persist({...data,[key]:data[key].map(r=>{ if(r.id!==id)return r; if(!ok)return{...r,status:"rejected"}; if(r.status==="pending_pl")return{...r,status:"pending_lg"}; if(r.status==="pending_lg")return{...r,status:key==="overtime"?"completed":"approved"}; return r; })});
    flash(ok?"승인했어요.":"반려했어요."); };
  const addLate=(date,lateMinutes,reason)=>{ persist({...data,late:[{id:uid(),memberId:authId,date,lateMinutes,reason,resolvedUsageId:null},...data.late]}); flash("지각을 등록했어요."); };
  const resolveLate=(lateId,blockId)=>{ const late=data.late.find(l=>l.id===lateId); const block=data.overtime.find(o=>o.id===blockId); if(!late||!block)return;
    if(remainingOf(blockId)!==block.totalMin)return flash("이미 사용한 블록이에요.");
    if(block.totalMin<late.lateMinutes)return flash("이 블록("+fmtDur(block.totalMin)+")이 지각보다 짧아요.");
    const usageId=uid();
    persist({...data,
      usage:[{id:usageId,requesterId:authId,sourceId:blockId,type:"지각 상계",minutes:block.totalMin,date:late.date,reason:"지각 상계",plId:"",lgId:"",status:"approved"},...data.usage],
      late:data.late.map(l=>l.id===lateId?{...l,resolvedUsageId:usageId}:l)});
    flash("추가근무 블록("+fmtDur(block.totalMin)+")으로 지각을 해소했어요."); };
  const resolveEarly=(earlyId,blockId)=>{ const ev=(data.early||[]).find(l=>l.id===earlyId); const block=data.overtime.find(o=>o.id===blockId); if(!ev||!block)return;
    if(remainingOf(blockId)!==block.totalMin)return flash("이미 사용한 블록이에요.");
    if(block.totalMin<ev.earlyMinutes)return flash("이 블록("+fmtDur(block.totalMin)+")이 조퇴보다 짧아요.");
    const usageId=uid();
    persist({...data,
      usage:[{id:usageId,requesterId:authId,sourceId:blockId,type:"조퇴",minutes:block.totalMin,date:ev.date,reason:"조퇴 상계",plId:"",lgId:"",status:"approved"},...data.usage],
      early:data.early.map(l=>l.id===earlyId?{...l,resolvedUsageId:usageId}:l)});
    flash("추가근무 블록("+fmtDur(block.totalMin)+")으로 조퇴를 등록했어요."); };
  // 링크데이(회사 행사) 조퇴: 추가근무 상계 없이 "링크데이 참석"으로 수동 등록
  const markEarlyLinkDay=(earlyId)=>{ const ev=(data.early||[]).find(l=>l.id===earlyId); if(!ev)return;
    persist({...data,early:data.early.map(l=>l.id===earlyId?{...l,linkDay:true,reason:"링크데이 참석"}:l)});
    flash("링크데이 참석으로 등록했어요."); };
  const resetAll=()=>{ if(confirm("모든 기록을 초기화할까요?")){ persist(SEED()); flash("초기화했어요."); } };

  // 그룹웨어 싱크 결과를 지각/초과근무/조퇴로 자동 등록 (syncKey로 중복 방지)
  const applyGwSync=(days)=>{
    const myProj=data.projects.find(p=>p.memberIds.includes(authId)||p.plId===authId)||null;
    const existLate=new Set(data.late.filter(l=>l.syncKey).map(l=>l.syncKey));
    const existOt=new Set(data.overtime.filter(o=>o.syncKey).map(o=>o.syncKey));
    const existEarly=new Set((data.early||[]).filter(l=>l.syncKey).map(l=>l.syncKey));
    const newLate=[],newOt=[],newEarly=[],items=[]; let addedLate=0,addedOt=0,addedEarly=0,dup=0;
    const earlyInfo={}; // syncKey → {checkIn,checkOut} (기존 레코드 백필용)
    (days||[]).forEach(d=>{
      if(d.isHoliday) return;
      if(d.lateMinutes>0){
        const k="gw:late:"+authId+":"+d.date;
        if(existLate.has(k)){ dup++; }
        else{ newLate.push({id:uid(),memberId:authId,date:d.date,lateMinutes:d.lateMinutes,reason:"그룹웨어 싱크"+(d.event?(" · "+d.event):""),resolvedUsageId:null,syncKey:k}); existLate.add(k); addedLate++; items.push({date:d.date,type:"지각",min:d.lateMinutes,event:d.event}); }
      }
      if(d.earlyMinutes>0){
        const k="gw:early:"+authId+":"+d.date;
        earlyInfo[k]={checkIn:d.checkIn,checkOut:d.checkOut};
        if(existEarly.has(k)){ dup++; }
        else{ const isLink=!!d.linkDay; newEarly.push({id:uid(),memberId:authId,date:d.date,earlyMinutes:d.earlyMinutes,checkIn:d.checkIn,checkOut:d.checkOut,reason:isLink?"링크데이 참석":("그룹웨어 조퇴 싱크"+(d.event?(" · "+d.event):"")),resolvedUsageId:null,linkDay:isLink,syncKey:k}); existEarly.add(k); addedEarly++; items.push({date:d.date,type:isLink?"조퇴(링크데이)":"조퇴",min:d.earlyMinutes,event:isLink?"링크데이 참석":d.event}); }
      }
      if(d.overtimeMinutes>0){
        const k="gw:ot:"+authId+":"+d.date;
        if(existOt.has(k)){ dup++; }
        else{ newOt.push({id:uid(),requesterId:authId,projectId:myProj?myProj.id:"",date:d.date,reason:"그룹웨어 자동 싱크"+(d.event?(" · "+d.event):""),plId:myProj?myProj.plId||"":"",lgId:myProj?myProj.lgId||"":"",start:d.schedEnd,end:d.checkOut||"",totalMin:d.overtimeMinutes,status:"completed",syncKey:k}); existOt.add(k); addedOt++; items.push({date:d.date,type:"초과근무",min:d.overtimeMinutes,event:d.event}); }
      }
    });
    // 기존 조퇴 레코드에 출근/퇴근 시간이 비어 있으면 이번 싱크 값으로 백필
    let patched=0;
    const patchedEarly=(data.early||[]).map(l=>{
      const info=l.syncKey&&earlyInfo[l.syncKey];
      if(info&&(!l.checkIn||!l.checkOut)){ patched++; return {...l,checkIn:l.checkIn||info.checkIn,checkOut:l.checkOut||info.checkOut}; }
      return l;
    });
    if(newLate.length||newOt.length||newEarly.length||patched) persist({...data,late:[...newLate,...data.late],overtime:[...newOt,...data.overtime],early:[...newEarly,...patchedEarly]});
    items.sort((a,b)=>a.date<b.date?-1:1);
    return {addedLate,addedOt,addedEarly,dup,items,hasProject:!!myProj};
  };

  // 싱크 초기화: 그룹웨어 싱크로 불러온 내 지각·조퇴·추가근무(및 그로 소진된 사용 내역)를 모두 삭제
  const resetGwSync=async()=>{
    let latest=data;
    try{ const r=await fetch(DATA_API,{cache:"no-store"}); const j=await r.json(); if(j&&j.ok&&j.data) latest=j.data; }catch(e){}
    const isGw=(k,p)=>k&&String(k).indexOf(p)===0;
    const late=latest.late||[], early=latest.early||[], overtime=latest.overtime||[], usage=latest.usage||[];
    const rmLate=late.filter(l=>isGw(l.syncKey,"gw:late:")&&l.memberId===authId);
    const rmEarly=early.filter(l=>isGw(l.syncKey,"gw:early:")&&l.memberId===authId);
    const rmOt=overtime.filter(o=>isGw(o.syncKey,"gw:ot:")&&o.requesterId===authId);
    const rmBlockIds=new Set(rmOt.map(o=>o.id));                 // 삭제되는 추가근무 블록
    const rmUsageIds=new Set();                                   // 삭제되는 지각/조퇴가 만들었던 사용내역
    rmLate.concat(rmEarly).forEach(l=>{ if(l.resolvedUsageId) rmUsageIds.add(l.resolvedUsageId); });
    const next={ ...latest,
      late: late.filter(l=>!(isGw(l.syncKey,"gw:late:")&&l.memberId===authId)),
      early: early.filter(l=>!(isGw(l.syncKey,"gw:early:")&&l.memberId===authId)),
      overtime: overtime.filter(o=>!(isGw(o.syncKey,"gw:ot:")&&o.requesterId===authId)),
      usage: usage.filter(u=>!rmBlockIds.has(u.sourceId)&&!rmUsageIds.has(u.id)),
    };
    persist(next);
    return {late:rmLate.length, early:rmEarly.length, ot:rmOt.length};
  };



  return (
    <div className="app-root">
      <header className="topbar">
        <div className="brand"><span className="brand-mark">팀 근태 관리</span></div>
      </header>
      <main className="main">
        <Calendar data={data} authId={authId} meUser={meUser} visibleIds={visibleIds} scopeLabel={scopeLabel} remainingOf={remainingOf} member={member} myBlocks={myBlocks} persist={persist} flash={flash} onAddOvertime={addOvertime} onAddLate={addLate} onResolveLate={resolveLate} onDecide={decide} openMail={setModal} onManage={()=>setManageOpen(true)} onLogout={logout} onProfile={()=>setProfileOpen(true)} onGwSync={applyGwSync} onGwReset={resetGwSync} onResolveEarly={resolveEarly} onMarkLinkDay={markEarlyLinkDay} />
      </main>
      {profileOpen&&(
        <ProfileModal user={meUser} onSave={(patch)=>{updateMember(meUser.id,patch);}} flash={flash} onClose={()=>setProfileOpen(false)} />
      )}
      {manageOpen&&(meUser.role==="pl"||meUser.role==="lg"||meUser.role==="master")&&(
        <div className="backdrop" onClick={()=>setManageOpen(false)}>
          <div className="modal wide" onClick={(e)=>e.stopPropagation()}>
            <div className="modal-head"><h3>팀원·프로젝트 관리</h3><button className="x" onClick={()=>setManageOpen(false)}>✕</button></div>
            <Manage data={data} persist={persist} flash={flash} onReset={resetAll} />
          </div>
        </div>
      )}
      {modal&&<MailModal modal={modal} onClose={()=>setModal(null)} flash={flash} />}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

function Login({members,onLogin}){
  const [name,setName]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const submit=()=>{
    const u=members.find(m=>m.name===name.trim());
    if(!u){ setErr("이름을 찾을 수 없어요."); return; }
    if((u.pw||"1")!==pw){ setErr("비밀번호가 일치하지 않아요."); return; }
    onLogin(u.id);
  };
  return (
    <div className="login"><div className="login-card">
      <div className="brand center"><span className="brand-mark big">팀 근태 관리</span><span className="brand-sub">로그인</span></div>
      <p className="login-hint">이름과 비밀번호로 로그인하세요. (임시 비밀번호: 1)</p>
      <div className="sideform">
        <Field label="이름"><input className="input" value={name} onChange={e=>{setName(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="이름" /></Field>
        <Field label="비밀번호"><input className="input" type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="비밀번호" /></Field>
      </div>
      {err&&<p className="login-err">{err}</p>}
      <button className="btn primary fullw mt" onClick={submit}>로그인</button>
    </div></div>
  );
}

function Calendar({data,authId,meUser,visibleIds,scopeLabel,remainingOf,member,myBlocks,persist,flash,onAddOvertime,onAddLate,onResolveLate,onResolveEarly,onMarkLinkDay,onDecide,openMail,onManage,onLogout,onProfile,onGwSync,onGwReset}){
  const now=new Date();
  const [view,setView]=useState({y:now.getFullYear(),m:now.getMonth()});
  const [sel,setSel]=useState(null);
  const [syncOpen,setSyncOpen]=useState(false);
  const [report,setReport]=useState(null);
  const [blockMember,setBlockMember]=useState("all");
  const [blockSort,setBlockSort]=useState("date");
  const [addBlkOpen,setAddBlkOpen]=useState(false);
  const isMaster=meUser.role==="master";
  const first=new Date(view.y,view.m,1), startDow=first.getDay(), daysIn=new Date(view.y,view.m+1,0).getDate();
  const cells=[]; for(let i=0;i<startDow;i++)cells.push(null); for(let d=1;d<=daysIn;d++)cells.push(d); while(cells.length%7)cells.push(null);
  const dayKey=(d)=>view.y+"-"+String(view.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const eventsFor=(ds)=>{
    const evs=[];
    data.late.filter(l=>visibleIds.includes(l.memberId)&&l.date===ds).forEach(l=>{
      evs.push({ cls:l.resolvedUsageId?"ev-fixed":"ev-late", name:member(l.memberId)?.name||"", time:l.resolvedUsageId?"지각 해소":"지각 "+fmtDur(l.lateMinutes) });
    });
    (data.early||[]).filter(l=>visibleIds.includes(l.memberId)&&l.date===ds).forEach(l=>{
      evs.push({ cls:(l.resolvedUsageId||l.linkDay)?"ev-fixed":"ev-early", name:member(l.memberId)?.name||"", time:l.linkDay?"링크데이":(l.resolvedUsageId?"조퇴 등록":"조퇴 "+fmtDur(l.earlyMinutes)) });
    });
    data.overtime.filter(o=>visibleIds.includes(o.requesterId)&&o.date===ds&&o.status==="completed").forEach(o=>{
      const used=remainingOf(o.id)===0;
      evs.push({ cls:used?"ev-otdone":"ev-otun", name:member(o.requesterId)?.name||"", time:used?"사용완료":fmtDur(o.totalMin) });
    });
    data.overtime.filter(o=>o.date===ds&&(isMaster?(o.status==="pending_pl"||o.status==="pending_lg"):((o.status==="pending_pl"&&o.plId===authId)||(o.status==="pending_lg"&&o.lgId===authId)))).forEach(o=>{
      evs.push({ cls:"ev-pending", name:member(o.requesterId)?.name||"", time:"승인대기" });
    });
    data.usage.filter(u=>u.date===ds&&(isMaster?(u.status==="pending_pl"||u.status==="pending_lg"):((u.status==="pending_pl"&&u.plId===authId)||(u.status==="pending_lg"&&u.lgId===authId)))).forEach(u=>{
      evs.push({ cls:"ev-pending", name:member(u.requesterId)?.name||"", time:u.type+" 대기" });
    });
    return evs;
  };
  const allBlocks=data.overtime.filter(o=>visibleIds.includes(o.requesterId)&&o.status==="completed").map(o=>{ const rem=remainingOf(o.id); const usedState=rem===0?"사용 완료":"미사용"; return {...o,rem,usedState}; });
  // 추가근무 내역: 인원 필터 + 정렬(날짜/시간) + 잔여 시간
  const canFilterBlocks=visibleIds.length>1;
  const blockMemberOpts=visibleIds.map(id=>member(id)).filter(m=>m&&m.role!=="master").sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  const filteredBlocks=(blockMember==="all"||!canFilterBlocks)?allBlocks:allBlocks.filter(b=>b.requesterId===blockMember);
  const sortedBlocks=[...filteredBlocks].sort((a,b)=> blockSort==="time" ? (b.totalMin-a.totalMin)||(a.date<b.date?1:-1) : (a.date<b.date?1:a.date>b.date?-1:0));
  const remainSum=filteredBlocks.reduce((s,b)=>s+(b.rem||0),0);
  // 추가근무 직접 등록 (싱크와 별개 · 예: 작년 이월분) — status completed로 즉시 적립, syncKey 없음(초기화에 안 지워짐)
  const submitManualBlock=(f)=>{
    persist({...data,overtime:[{id:uid(),requesterId:f.memberId,projectId:"",date:f.date,reason:f.reason||"직접 등록",plId:"",lgId:"",start:f.start,end:f.end,totalMin:f.totalMin,status:"completed"},...data.overtime]});
    flash("추가근무를 등록했어요.");
    setAddBlkOpen(false);
  };
  const move=(delta)=>{ let m=view.m+delta,y=view.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} setView({y,m}); };
  const goToday=()=>setView({y:now.getFullYear(),m:now.getMonth()});

  // 추가근무 추출: 현재 표시 중인 월 기준, 사용자별 추가근무 블록 + (조퇴에 사용했으면 조퇴 내역)을 진짜 .xlsx로 출력
  const exportOvertime=()=>{
    if(typeof XLSX==="undefined"){ flash("엑셀 모듈을 불러오지 못했어요. 인터넷 연결을 확인해 주세요."); return; }
    const ym=view.y+"-"+String(view.m+1).padStart(2,"0");
    const fmtHM=(min)=>{ if(min==null)return""; const h=Math.floor(min/60),m=min%60; return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0"); };
    const fmtMD=(ds)=>{ const p=String(ds||"").split("-"); return p.length===3?(p[1]+"월 "+p[2]+"일"):""; };
    const mems=visibleIds.map(id=>member(id)).filter(m=>m&&m.role!=="master").sort((a,b)=>a.name.localeCompare(b.name,"ko"));
    // 데이터 행(2차원 배열): [사용자, 추가근무 날짜, 가용시간, 조퇴 날짜, 출근시간, 퇴근시간]
    const body=[];
    mems.forEach(mem=>{
      const blocks=data.overtime.filter(o=>o.requesterId===mem.id&&o.status==="completed"&&String(o.date).slice(0,7)===ym).sort((a,b)=>a.date<b.date?-1:1);
      if(blocks.length===0){ body.push([mem.name,"","","","",""]); return; }
      blocks.forEach(b=>{
        const use=data.usage.find(u=>u.type==="조퇴"&&u.sourceId===b.id&&u.status!=="rejected");
        let eDate="",eIn="",eOut="";
        if(use){ const ev=(data.early||[]).find(e=>e.memberId===mem.id&&e.date===use.date); eDate=fmtMD(use.date); eIn=(ev&&ev.checkIn)||""; eOut=(ev&&ev.checkOut)||""; }
        body.push([mem.name,fmtMD(b.date),fmtHM(b.totalMin),eDate,eIn,eOut]);
      });
    });
    const aoa=[
      [`${view.m+1}월`,"","","","",""],
      ["사용자","추가근무","","조퇴","",""],
      ["","날짜","가용시간","날짜","출근시간","퇴근시간"],
      ...body,
    ];
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!merges"]=[
      {s:{r:0,c:0},e:{r:0,c:5}},   // 6월 (전체 가로 병합)
      {s:{r:1,c:0},e:{r:2,c:0}},   // 사용자 (세로 병합)
      {s:{r:1,c:1},e:{r:1,c:2}},   // 추가근무 (2칸)
      {s:{r:1,c:3},e:{r:1,c:5}},   // 조퇴 (3칸)
    ];
    ws["!cols"]=[{wch:10},{wch:11},{wch:9},{wch:11},{wch:9},{wch:9}];
    const border={top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
    const center={horizontal:"center",vertical:"center"};
    const titleStyle={font:{bold:true,sz:13},alignment:center,border};
    const hdrStyle={font:{bold:true},alignment:center,border,fill:{patternType:"solid",fgColor:{rgb:"EEEEFF"}}};
    const cellStyle={alignment:center,border};
    const lastRow=aoa.length-1;
    for(let R=0;R<=lastRow;R++){
      for(let C=0;C<=5;C++){
        const addr=XLSX.utils.encode_cell({r:R,c:C});
        if(!ws[addr]) ws[addr]={t:"s",v:""};
        ws[addr].s = R===0?titleStyle : (R<=2?hdrStyle:cellStyle);
      }
    }
    ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:lastRow,c:5}});
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,`${view.m+1}월`);
    XLSX.writeFile(wb,`${view.y}년 ${view.m+1}월 추가근무.xlsx`);
    flash(`${view.m+1}월 추가근무 추출 완료 (${mems.length}명)`);
  };

  return (
    <div className="cal-layout">
      <section className="panel cal-main">
        <div className="cal-bar">
          <div className="cal-title"><button className="navbtn" onClick={()=>move(-1)}>‹</button><strong>{view.y}년 {view.m+1}월</strong><button className="navbtn" onClick={()=>move(1)}>›</button><button className="btn small ghost" onClick={goToday}>오늘</button></div>
          <div className="rowbtns">
            <button className="btn small primary" onClick={()=>setSyncOpen(true)}>그룹웨어 싱크</button>
            <button className="btn small ghost" onClick={exportOvertime}>추가근무 추출</button>
          </div>
        </div>
        <p className="scope">표시 범위: <strong>{scopeLabel}</strong></p>
        <div className="legend"><span><i className="sw sw-late"></i>지각(미해소)</span><span><i className="sw sw-fixed"></i>지각/조퇴(해소)</span><span><i className="sw sw-early"></i>조퇴(미등록)</span><span><i className="sw sw-otun"></i>추가근무(미사용)</span><span><i className="sw sw-otdone"></i>추가근무(사용완료)</span><span><i className="sw sw-pending"></i>승인 대기</span></div>
        <div className="cal-wdrow">
          {WD.map((w,i)=><div key={w} className={"cal-wd"+(i===0?" sun":i===6?" sat":"")}>{w}</div>)}
        </div>
        <div className="cal-days">
          {cells.map((d,i)=>{
            if(!d) return <div key={i} className="cal-cell empty-cell"></div>;
            const ds=dayKey(d), evs=eventsFor(ds), isToday=ds===today(), dow=(startDow+d-1)%7;
            const shown=evs.slice(0,4);
            return (<button key={i} className={"cal-cell"+(isToday?" today":"")+(sel===ds?" sel":"")} onClick={()=>setSel(ds)}>
              <span className={"cal-num"+(dow===0?" sun":dow===6?" sat":"")}>{d}</span>
              <span className="cal-events">
                {shown.map((e,k)=>(<span key={k} className={"ev "+e.cls}><b>{e.name}</b> {e.time}</span>))}
                {evs.length>shown.length&&<span className="ev-more">+{evs.length-shown.length}건</span>}
              </span>
            </button>);
          })}
        </div>
      </section>

      <aside className="cal-side">
        <section className="panel side-panel loginbox">
          <div className="who-name">{meUser.name}<span className={"rolepill r-"+meUser.role}>{ROLE_LABEL[meUser.role]}</span></div>
          {(meUser.dept||meUser.email||meUser.phone)&&<div className="dim" style={{fontSize:"12px",margin:"2px 0 4px",lineHeight:1.5}}>{meUser.dept||""}{meUser.email?<span><br/>{meUser.email}</span>:null}{meUser.phone?<span> · {meUser.phone}</span>:null}</div>}
          <div className="who-actions">
            {(meUser.role==="pl"||meUser.role==="lg"||meUser.role==="master")&&<button className="link" onClick={onManage}>팀원·프로젝트</button>}
            <button className="link" onClick={onProfile}>정보변경</button>
            <button className="link" onClick={onLogout}>로그아웃</button>
          </div>
        </section>
        <section className="panel side-panel" style={{padding:"12px 14px"}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn small ghost" style={{flex:1}} onClick={()=>setReport("plan")}>계획 보고</button>
            <button className="btn small ghost" style={{flex:1}} onClick={()=>setReport("result")}>결과 보고</button>
            <button className="btn small ghost" style={{flex:"1 1 100%"}} onClick={()=>setReport("adjust")}>근무조정 보고</button>
          </div>
        </section>
        <section className="panel side-panel side-blocks">
          <div className="panel-head" style={{marginBottom:8}}><h2 className="panel-title" style={{fontSize:"15px"}}>추가근무 내역</h2><div style={{display:"flex",alignItems:"center",gap:8}}><span className="dim">{filteredBlocks.length}건</span><button className="btn small ghost" onClick={()=>setAddBlkOpen(true)}>＋ 직접 등록</button></div></div>
          {canFilterBlocks&&(
            <select className="input mini" style={{width:"100%",marginBottom:8}} value={blockMember} onChange={e=>setBlockMember(e.target.value)}>
              <option value="all">전체 인원</option>
              {blockMemberOpts.map(m=><option key={m.id} value={m.id}>{m.name}{m.dept?(" · "+m.dept):""}</option>)}
            </select>
          )}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            <span className="dim" style={{fontSize:"12.5px"}}>잔여 <strong className="big-balance sm" style={{fontSize:"16px"}}>{fmtDur(remainSum)}</strong></span>
            <div className="rowbtns">
              <button className={"btn small "+(blockSort==="date"?"primary":"ghost")} onClick={()=>setBlockSort("date")}>날짜순</button>

          {sortedBlocks.length===0?<Empty>적립된 추가근무가 없어요.</Empty>:(
            <ul className="list side-blocks-list">
              {sortedBlocks.map(b=>(
                <li key={b.id} className="item" style={{padding:"9px 2px"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
                    <strong style={{fontSize:"13px"}}>{b.date}{visibleIds.length>1?<span className="dim" style={{fontWeight:400}}> · {member(b.requesterId)?.name}</span>:null}</strong>
                    <span className="dim" style={{fontSize:"11.5px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(data.projects.find(p=>p.id===b.projectId)?.name)?(data.projects.find(p=>p.id===b.projectId).name+" · "):""}{b.reason}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
                    <strong className="num" style={{fontSize:"13px"}}>{fmtDur(b.totalMin)}</strong>
                    <span className={"chip "+(b.usedState==="사용 완료"?"s-done":"s-ot")} style={{fontSize:"10px",padding:"1px 7px"}}>{b.usedState}</span>
                  </div>
                </li>
              ))}
            </ul>
          )}
        </section>
      </aside>

      {sel&&<DayDetail ds={sel} data={data} authId={authId} meUser={meUser} visibleIds={visibleIds} member={member} remainingOf={remainingOf} myBlocks={myBlocks} onClose={()=>setSel(null)} onResolveLate={onResolveLate} onResolveEarly={onResolveEarly} onMarkLinkDay={onMarkLinkDay} onDecide={onDecide} />}
      {syncOpen&&<SyncModal meUser={meUser} onGwSync={onGwSync} onGwReset={onGwReset} flash={flash} onProfile={onProfile} onClose={()=>setSyncOpen(false)} />}
      {(report==="plan"||report==="result")&&<ReportModal kind={report} data={data} authId={authId} meUser={meUser} member={member} persist={persist} flash={flash} openMail={openMail} onClose={()=>setReport(null)} />}
      {report==="adjust"&&<AdjustModal data={data} authId={authId} meUser={meUser} openMail={openMail} onClose={()=>setReport(null)} />}
      {addBlkOpen&&<AddBlockModal authId={authId} visibleIds={visibleIds} member={member} defaultMember={blockMember} onSubmit={submitManualBlock} onClose={()=>setAddBlkOpen(false)} />}
    </div>
  );
}

function AddBlockModal({authId,visibleIds,member,defaultMember,onSubmit,onClose}){
  const canPick=visibleIds.length>1;
  const opts=visibleIds.map(id=>member(id)).filter(m=>m&&m.role!=="master").sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  const [memberId,setMemberId]=useState(defaultMember&&defaultMember!=="all"?defaultMember:authId);
  const [date,setDate]=useState(today());
  const [start,setStart]=useState("17:30");
  const [end,setEnd]=useState("");
  const [reason,setReason]=useState("");
  const overtimeMin=calcOvertime(start,end);
  const submit=()=>{
    if(!memberId)return alert("담당자를 선택해 주세요.");
    if(overtimeMin<=0)return alert("종료 시간이 17:30 이후이고 시작보다 늦어야 해요.");
    onSubmit({memberId,date,start,end,totalMin:overtimeMin,reason:reason.trim()});
  };
  return (
    <div className="backdrop" onClick={onClose}><div className="modal" onClick={(e)=>e.stopPropagation()}>
      <div className="modal-head"><h3>추가근무 직접 등록</h3><button className="x" onClick={onClose}>✕</button></div>
      <p className="dim mb">그룹웨어 싱크와 별개로 추가근무를 직접 적어 적립합니다. (예: 작년 이월분) · 싱크 초기화로 지워지지 않습니다.</p>
      <div className="form">
        {canPick&&<Field label="담당자" full><select className="input" value={memberId} onChange={e=>setMemberId(e.target.value)}>{opts.map(m=><option key={m.id} value={m.id}>{m.name}{m.dept?(" · "+m.dept):""}</option>)}</select></Field>}
        <Field label="일자"><input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)} /></Field>
        <Field label="사유 (선택)"><input className="input" value={reason} onChange={e=>setReason(e.target.value)} placeholder="예: 작년 이월" /></Field>
        <Field label="시작 시간"><input className="input" type="time" value={start} onChange={e=>setStart(e.target.value)} /></Field>
        <Field label="종료 시간"><input className="input" type="time" value={end} onChange={e=>setEnd(e.target.value)} /></Field>
      </div>
      <p className="calc" style={{marginTop:10}}>인정 추가근무: <strong>{overtimeMin>0?fmtDur(overtimeMin):"—"}</strong> <span className="dim">(17:30 이후 기준)</span></p>
      <div className="actions"><button className="btn primary" onClick={submit}>등록</button><button className="btn ghost" onClick={onClose}>닫기</button></div>
    </div></div>
  );
}

function ReportModal({kind,data,authId,meUser,member,persist,flash,openMail,onClose}){
  const canMng=meUser.role==="master"||meUser.role==="lg"||meUser.role==="partlead";
  const reportable=canMng?data.projects:data.projects.filter(p=>p.plId===authId||(p.memberIds||[]).includes(authId));
  const [projectId,setProjectId]=useState(reportable[0]?.id||"");
  const [date,setDate]=useState(today());
  const [toExtra,setToExtra]=useState(""); // 받는사람 추가 1인 (고정 수신자 외)
  const [reasons,setReasons]=useState({});
  const [initReasons,setInitReasons]=useState({}); // 불러온 원본(변경 감지용)
  const [leaves,setLeaves]=useState({});           // 결과 보고 퇴근시간 (member→HH:MM)
  const [initLeaves,setInitLeaves]=useState({});
  const proj=data.projects.find(p=>p.id===projectId)||null;
  // 저장/불러온 데이터로 사유·퇴근시간 맵 구성 (퇴근시간 기본값 = 싱크된 추가근무 종료시각)
  const buildMaps=(d)=>{
    const p=(d.projects||[]).find(x=>x.id===projectId);
    const saved={}; (d.otReports||[]).filter(x=>x.projectId===projectId&&x.date===date).forEach(x=>{ saved[x.memberId]=x; });
    const rmap={}, lmap={};
    (p?.memberIds||[]).forEach(mid=>{
      const s=saved[mid];
      rmap[mid]=s?(s.reason||""):"";
      if(s&&s.leave) lmap[mid]=s.leave;
      else { const blk=(d.overtime||[]).find(o=>o.requesterId===mid&&o.date===date&&o.status==="completed"); lmap[mid]=blk?(blk.end||""):""; }
    });
    return {rmap,lmap};
  };
  useEffect(()=>{
    const {rmap,lmap}=buildMaps(data);
    setReasons(rmap); setInitReasons(rmap); setLeaves(lmap); setInitLeaves(lmap);
    const p=data.projects.find(x=>x.id===projectId);
    setToExtra(p&&p.reportTo?p.reportTo:"");
  },[projectId,date]);
  const rows=(proj?.memberIds||[]).map(mid=>{ const m=member(mid); return { memberId:mid, name:m?.name||"(삭제됨)" }; });
  // 저장 직전 서버 최신본을 받아 '내가 바꾼 행'만 덮어써서 병합 → 동시 작성 충돌(덮어쓰기) 방지
  const persistData=async()=>{
    let latest=data;
    try{ const r=await fetch(DATA_API,{cache:"no-store"}); const j=await r.json(); if(j&&j.ok&&j.data) latest=j.data; }catch(e){}
    let reps=[...(latest.otReports||[])];
    rows.forEach(r=>{
      const reason=(reasons[r.memberId]||"").trim();
      const leave=(leaves[r.memberId]||"").trim();
      const changed = reason!==(initReasons[r.memberId]||"").trim() || leave!==(initLeaves[r.memberId]||"").trim();
      if(!changed) return; // 안 바뀐 행은 건드리지 않음 (남의 입력 보존)
      const idx=reps.findIndex(x=>x.projectId===projectId&&x.date===date&&x.memberId===r.memberId);
      if(idx>=0) reps[idx]={...reps[idx],reason,leave}; else if(reason||leave) reps.push({projectId,date,memberId:r.memberId,reason,leave});
    });
    const projects=(latest.projects||[]).map(p=>p.id===projectId?{...p,reportTo:toExtra.trim()}:p);
    const next={...latest,otReports:reps,projects};
    persist(next);
    return next;
  };
  const onSave=async()=>{ if(!proj)return; const merged=await persistData();
    const {rmap,lmap}=buildMaps(merged); setReasons(rmap); setInitReasons(rmap); setLeaves(lmap); setInitLeaves(lmap);
    flash("보고 내용을 저장했어요."); };
  const onGen=async()=>{
    if(!proj)return alert("프로젝트를 선택해 주세요.");
    if((proj.memberIds||[]).length===0)return alert("이 프로젝트에 소속 팀원이 없어요. 팀원·프로젝트 관리에서 추가해 주세요.");
    const merged=await persistData();
    const {rmap,lmap}=buildMaps(merged);
    const mail=buildReportMail({kind,project:proj,date,to:reportTo(toExtra),cc:REPORT_CC_FIXED,reporter:meUser,rows:rows.map(r=>({name:r.name,reason:rmap[r.memberId]||reasons[r.memberId]||"",leave:lmap[r.memberId]||leaves[r.memberId]||""}))});
    openMail(mail); onClose();
  };
  const kindLabel=kind==="result"?"결과":"계획";
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="modal wide" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-head"><h3>연장 근무 {kindLabel} 보고</h3><button className="x" onClick={onClose}>✕</button></div>
        {reportable.length===0?<Empty>보고할 수 있는 소속 프로젝트가 없어요. 팀원·프로젝트 관리에서 프로젝트에 배정되어야 합니다.</Empty>:(
        <React.Fragment>
        <div className="form">
          <Field label="프로젝트"><select className="input" value={projectId} onChange={e=>setProjectId(e.target.value)}>{reportable.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Field>
          <Field label="일자"><input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)} /></Field>
          <Field label="받는 사람 (고정)"><input className="input" value={REPORT_TO_FIXED} readOnly disabled /></Field>
          <Field label="받는 사람 추가 (1인, 선택)"><input className="input" value={toExtra} onChange={e=>setToExtra(e.target.value)} placeholder="추가 받는사람 이메일" autoComplete="off" /></Field>
          <Field label="참조 (고정)" full><input className="input" value={REPORT_CC_FIXED} readOnly disabled /></Field>
        </div>
        <p className="panel-sub" style={{margin:"10px 0 0"}}>담당자별 연장근무 사유 (전체 편집 가능) · 제목: <strong>[보고] {proj?.name} 프로젝트 연장 근무 {kindLabel} 보고 ({String(date).replace(/-/g,"/")})</strong></p>
        <div className="tablewrap">
          <table className="reptable">
            <thead><tr><th>담당자</th><th>연장근무 사유</th>{kind==="result"&&<th style={{width:110}}>퇴근 시간</th>}</tr></thead>
            <tbody>
              {rows.length===0?<tr><td className="c" colSpan={kind==="result"?3:2}><span className="dim">소속 팀원이 없어요.</span></td></tr>:rows.map(r=>(
                <tr key={r.memberId}>
                  <td className="c" style={{whiteSpace:"nowrap"}}>{r.name}{r.memberId===authId?<span className="dim"> (나)</span>:null}</td>
                  <td><textarea value={reasons[r.memberId]||""} onChange={e=>setReasons({...reasons,[r.memberId]:e.target.value})} placeholder="연장근무 사유 (줄바꿈 가능)" /></td>
                  {kind==="result"&&<td className="c"><input className="input" type="time" style={{width:"100%",padding:"6px 8px"}} value={leaves[r.memberId]||""} onChange={e=>setLeaves({...leaves,[r.memberId]:e.target.value})} /></td>}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <p className="dim" style={{margin:"8px 0 0",fontSize:"12px"}}>※ 다른 인원의 사유도 직접 입력·저장할 수 있고, 저장하면 공유 취합됩니다. {kind==="result"&&"퇴근 시간은 싱크된 추가근무 값이 기본이며 전 인원 직접 수정 가능합니다."}</p>
        <div className="actions"><button className="btn primary" onClick={onGen}>메일 초안 생성</button><button className="btn ghost" onClick={onSave}>사유 저장</button><button className="btn ghost" onClick={onClose}>닫기</button></div>
        </React.Fragment>
        )}
      </div>
    </div>
  );
}

function AdjustModal({data,authId,meUser,openMail,onClose}){
  const pad=(n)=>String(n).padStart(2,"0");
  const today=new Date();
  const LS="att2:adjustCfg";
  const saved=(()=>{ try{return JSON.parse(localStorage.getItem(LS)||"{}");}catch(e){return {};} })();
  const [kind,setKind]=useState("퇴근");
  const [reason,setReason]=useState(saved.reason||"개인 정비");
  const [time,setTime]=useState(pad(today.getHours())+":"+pad(today.getMinutes()));
  const [otId,setOtId]=useState("");
  const [title,setTitle]=useState(saved.title!=null?saved.title:(meUser.title||"연구원"));
  const [toExtra,setToExtra]=useState(saved.toExtra||""); // 받는사람 추가 1인 (고정 외)
  // 기타: 내 추가근무(완료 블록) 중 선택 → "YYYY년 MM월 DD일 추가 근무 건에 대한 조퇴"
  const myOts=data.overtime.filter(o=>o.requesterId===authId&&o.status==="completed").sort((a,b)=>a.date<b.date?1:-1);
  const fmtEtc=(ds)=>{ const p=String(ds).split("-"); return p.length===3?(p[0]+"년 "+p[1]+"월 "+p[2]+"일 추가 근무 건에 대한 조퇴"):""; };
  const gen=()=>{
    const [hh,mm]=String(time||"0:0").split(":").map(n=>parseInt(n,10)||0);
    const ot=myOts.find(o=>o.id===otId);
    const etc=ot?fmtEtc(ot.date):"";
    try{ localStorage.setItem(LS,JSON.stringify({reason,title,toExtra})); }catch(e){}
    openMail(buildAdjustMail({reporter:meUser,title,teamTag:REPORT_TEAM_TAG,kind,reason,y:today.getFullYear(),mo:today.getMonth()+1,d:today.getDate(),hh,mm,etc,to:reportTo(toExtra),cc:REPORT_CC_FIXED}));
  };
  return (
    <div className="backdrop" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head"><h3>근무조정 보고</h3><button className="x" onClick={onClose}>✕</button></div>
      <p className="dim mb">금일(<strong>{today.getFullYear()}년 {pad(today.getMonth()+1)}월 {pad(today.getDate())}일</strong>) 기준 근무조정 보고 메일을 생성합니다. 시간·사유·기타를 입력하세요.</p>
      <div className="approver-info" style={{marginTop:0}}>조정 인원 <strong>{meUser.name}</strong></div>
      <div className="form" style={{marginTop:12}}>
        <Field label="구분"><select className="input" value={kind} onChange={e=>setKind(e.target.value)}><option value="퇴근">퇴근</option><option value="출근">출근</option></select></Field>
        <Field label="조정 시간 (금일)"><input className="input" type="time" value={time} onChange={e=>setTime(e.target.value)} /></Field>
        <Field label="조정 사유" full><input className="input" value={reason} onChange={e=>setReason(e.target.value)} placeholder="예: 개인 정비" /></Field>
        <Field label="기타 — 내 추가근무에서 선택 (선택)" full>
          <select className="input" value={otId} onChange={e=>setOtId(e.target.value)}>
            <option value="">없음</option>
            {myOts.map(o=><option key={o.id} value={o.id}>{o.date} · {fmtDur(o.totalMin)}{o.reason?(" · "+o.reason):""}</option>)}
          </select>
        </Field>
        <Field label="제목 머리(팀)"><input className="input" value={REPORT_TEAM_TAG} readOnly disabled /></Field>
        <Field label="직급"><input className="input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 연구원" /></Field>
        <Field label="받는 사람 (고정)"><input className="input" value={REPORT_TO_FIXED} readOnly disabled /></Field>
        <Field label="받는 사람 추가 (1인, 선택)"><input className="input" value={toExtra} onChange={e=>setToExtra(e.target.value)} placeholder="추가 받는사람 이메일" /></Field>
        <Field label="참조 (고정)" full><input className="input" value={REPORT_CC_FIXED} readOnly disabled /></Field>
      </div>
      <p className="dim" style={{margin:"8px 0 0",fontSize:"12px"}}>※ 사유·직급·추가 받는사람은 생성 시 이 기기에 저장돼 다음에 자동 입력됩니다.</p>
      <div className="actions"><button className="btn primary" onClick={gen}>메일 초안 생성</button><button className="btn ghost" onClick={onClose}>닫기</button></div>
    </div></div>
  );
}

function SyncModal({meUser,onGwSync,onGwReset,flash,onProfile,onClose}){
  const MONTHS=recentMonths(6);
  const [gwId,setGwId]=useState("");
  const [gwPw,setGwPw]=useState("");
  const [api,setApi]=useState(DEFAULT_GW_API);
  const [picked,setPicked]=useState([MONTHS[0]]);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [result,setResult]=useState(null);
  const [showAdv,setShowAdv]=useState(false);
  useEffect(()=>{ (async()=>{ const c=await gwCredGet(meUser.id); setGwId(c.gwId||""); setGwPw(c.gwPw||""); setApi(await gwApiGet()); })(); },[meUser.id]);
  const toggle=(m)=>setPicked(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);
  const run=async()=>{
    setErr(""); setResult(null);
    if(!gwId||!gwPw){ setErr("‘정보변경’에서 그룹웨어 ID/PW를 먼저 입력해 주세요."); return; }
    if(picked.length===0){ setErr("싱크할 월을 1개 이상 선택해 주세요."); return; }
    setBusy(true);
    try{
      await gwApiSet(api);
      const months=[...picked].sort();
      const res=await fetch(api.replace(/\/+$/,"")+"/api/groupware/attendance",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id:gwId,pw:gwPw,months})
      });
      const j=await res.json().catch(()=>null);
      if(!res.ok||!j||!j.ok){ setErr((j&&j.error)||("요청 실패 ("+res.status+")")); setBusy(false); return; }
      const allDays=months.flatMap(m=>j.months[m]||[]);
      const summary=onGwSync(allDays);
      setResult(summary);
    }catch(e){
      setErr("백엔드 서버에 연결할 수 없습니다. backend 폴더에서 npm install 후 npm start 하고 다시 시도해 주세요. ("+e.message+")");
    }
    setBusy(false);
  };
  const doReset=async()=>{
    if(!window.confirm("그룹웨어 싱크로 불러온 지각·조퇴·추가근무 내역을 모두 삭제할까요?\n(직접 등록한 내역은 유지됩니다.)")) return;
    setBusy(true); setErr(""); setResult(null);
    try{ const s=await onGwReset(); flash("싱크 초기화 완료 — 지각 "+s.late+" · 조퇴 "+s.early+" · 추가근무 "+s.ot+" 삭제"); onClose(); }
    catch(e){ setErr("싱크 초기화 실패: "+(e&&e.message||e)); setBusy(false); }
  };
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-head"><h3>그룹웨어 근태 싱크</h3><button className="x" onClick={onClose}>✕</button></div>
        <p className="dim mb">그룹웨어(nhr) 근태를 가져와 <strong>지각</strong>·<strong>조퇴</strong>·<strong>초과근무</strong>를 자동 등록합니다. (조퇴는 사용한 추가근무를 ‘일자 상세’에서 등록 가능 · 기준 08:30~17:30, 반차 자동 반영)</p>
        {(!gwId||!gwPw)&&(
          <div className="warnline" style={{marginTop:0}}>그룹웨어 ID/PW가 저장되어 있지 않아요. <button className="link" onClick={()=>{onClose();onProfile();}}>정보변경에서 입력하기</button></div>
        )}
        <div className="approver-info" style={{marginTop:12}}>연동 계정 <strong>{gwId||"(미설정)"}</strong> · 대상 <strong>{meUser.name}</strong></div>
        <Field label="싱크할 월 (여러 개 선택 가능)" full>
          <div className="chips-pick">
            {MONTHS.map(m=>(<button key={m} className={"mchip"+(picked.includes(m)?" on":"")} onClick={()=>toggle(m)}>{m}</button>))}
          </div>
        </Field>
        <p className="dim" style={{margin:"8px 0 0"}}><button className="link" onClick={()=>setShowAdv(v=>!v)}>{showAdv?"▾":"▸"} 서버 주소 설정</button></p>
        {showAdv&&<Field label="백엔드 서버 주소" full><input className="input" value={api} onChange={e=>setApi(e.target.value)} placeholder={DEFAULT_GW_API} /></Field>}
        {err&&<p className="login-err" style={{textAlign:"left"}}>{err}</p>}
        {result&&(
          <div className="day-sec" style={{marginTop:14}}>
            <h4>싱크 결과 — 지각 {result.addedLate} · 조퇴 {result.addedEarly||0} · 초과근무 {result.addedOt}{result.dup?(" · 중복 건너뜀 "+result.dup):""}</h4>
            {!result.hasProject&&result.addedOt>0&&<p className="warnline" style={{marginTop:0}}>소속 프로젝트가 없어 초과근무 블록의 승인자(PL·스탭)가 비어 있어요. 사용하려면 팀원·프로젝트 관리에서 프로젝트를 배정하세요.</p>}
            {result.items.length===0?<p className="dim">새로 등록할 지각/초과근무가 없어요.</p>:(
              <div className="resolve-list" style={{flexDirection:"column",alignItems:"stretch",gap:4}}>
                {result.items.map((it,i)=>(<div key={i} className="day-row" style={{padding:"4px 0"}}><div><span className="tag">{it.type}</span> <strong>{it.date}</strong> · {fmtDur(it.min)}{it.event?<span className="dim"> · {it.event}</span>:null}</div></div>))}
              </div>
            )}
          </div>
        )}
        <div className="actions">
          {result?(
            <React.Fragment>
              <button className="btn primary" onClick={onClose}>닫기</button>
              <button className="btn danger" onClick={doReset} disabled={busy}>싱크 초기화</button>
            </React.Fragment>
          ):(
            <React.Fragment>
              <button className="btn primary" onClick={run} disabled={busy}>{busy?"가져오는 중…":"싱크 실행"}</button>
              <button className="btn danger" onClick={doReset} disabled={busy}>싱크 초기화</button>
              <button className="btn ghost" onClick={onClose} disabled={busy}>취소</button>
            </React.Fragment>
          )}
        </div>
      </div>
    </div>
  );
}

function DayDetail({ds,data,authId,meUser,visibleIds,member,remainingOf,myBlocks,onClose,onResolveLate,onResolveEarly,onMarkLinkDay,onDecide}){
  const proj=(id)=>data.projects.find(p=>p.id===id);
  const lates=data.late.filter(l=>visibleIds.includes(l.memberId)&&l.date===ds);
  const earlies=(data.early||[]).filter(l=>visibleIds.includes(l.memberId)&&l.date===ds);
  const ots=data.overtime.filter(o=>visibleIds.includes(o.requesterId)&&o.date===ds&&o.status==="completed");
  const uses=data.usage.filter(u=>visibleIds.includes(u.requesterId)&&u.date===ds&&u.status!=="rejected");
  const myOts=data.overtime.filter(o=>o.requesterId===authId&&o.date===ds&&o.status!=="completed"&&o.status!=="rejected");
  const isMaster=meUser.role==="master";
  const pendItems=[
    ...data.overtime.filter(o=>o.date===ds&&(isMaster?(o.status==="pending_pl"||o.status==="pending_lg"):((o.status==="pending_pl"&&o.plId===authId)||(o.status==="pending_lg"&&o.lgId===authId)))).map(o=>({...o,kind:"ot"})),
    ...data.usage.filter(u=>u.date===ds&&(isMaster?(u.status==="pending_pl"||u.status==="pending_lg"):((u.status==="pending_pl"&&u.plId===authId)||(u.status==="pending_lg"&&u.lgId===authId)))).map(u=>({...u,kind:"use"})),
  ];
  const [resolveFor,setResolveFor]=useState(null);
  const [resolveEarlyFor,setResolveEarlyFor]=useState(null);
  const unused=myBlocks.filter(b=>b.remaining===b.totalMin);
  const candidatesFor=(needMin)=>unused.filter(b=>b.totalMin>=needMin).sort((a,b)=>a.totalMin-b.totalMin);
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-head"><h3>{ds} ({WD[new Date(ds).getDay()]})</h3><button className="x" onClick={onClose}>✕</button></div>
        {pendItems.length>0&&(
          <div className="day-sec"><h4>승인 대기 — 내가 처리</h4>
            {pendItems.map(r=>(
              <div key={r.id} className="day-row">
                <div><span className="tag">{r.kind==="ot"?"추가근무":r.type}</span> <strong>{member(r.requesterId)?.name}</strong><span className="dim"> · {r.kind==="ot"?(proj(r.projectId)?.name):fmtDur(r.minutes)} · {r.reason}</span> <span className="dim">({r.status==="pending_pl"?"1차":"2차"})</span></div>
                <div className="rowbtns"><button className="btn small primary" onClick={()=>onDecide(r.kind,r.id,true)}>승인</button><button className="btn small danger" onClick={()=>onDecide(r.kind,r.id,false)}>반려</button></div>
              </div>
            ))}
          </div>
        )}
        <div className="day-sec"><h4>지각</h4>
          {lates.length===0?<p className="dim">없음</p>:lates.map(l=>(
            <div key={l.id} className="day-row">
              <div><strong>{member(l.memberId)?.name}</strong> · {fmtDur(l.lateMinutes)} 지각<span className="dim"> · {l.reason}</span></div>
              {l.resolvedUsageId?<span className="chip s-ok">추가근무로 해소</span>:l.memberId===authId?(
                resolveFor===l.id?(
                  <div className="resolve"><span className="dim">상계할 블록(길이 ≥ {fmtDur(l.lateMinutes)}, 통째 소진)</span>
                    <div className="resolve-list">
                      {candidatesFor(l.lateMinutes).length===0&&<span className="dim">충분한 블록이 없어요</span>}
                      {candidatesFor(l.lateMinutes).map((b,bi)=>(<button key={b.id} className={"btn small "+(bi===0?"primary":"ghost")} onClick={()=>{onResolveLate(l.id,b.id);setResolveFor(null);}}>{b.date} · {fmtDur(b.totalMin)}{bi===0?" · 추천":""}</button>))}
                    </div>
                  </div>
                ):<button className="btn small primary" onClick={()=>setResolveFor(l.id)}>추가근무로 해소</button>
              ):<span className="chip s-no">미해소</span>}
            </div>
          ))}
        </div>
        <div className="day-sec"><h4>조퇴</h4>
          {earlies.length===0?<p className="dim">없음</p>:earlies.map(l=>(
            <div key={l.id} className="day-row">
              <div><strong>{member(l.memberId)?.name}</strong> · {fmtDur(l.earlyMinutes)} 조퇴<span className="dim"> · {l.reason}</span></div>
              {l.linkDay?<span className="chip s-ok">링크데이 참석</span>:l.resolvedUsageId?<span className="chip s-ok">추가근무로 등록</span>:l.memberId===authId?(
                resolveEarlyFor===l.id?(
                  <div className="resolve"><span className="dim">사용할 추가근무 블록(길이 ≥ {fmtDur(l.earlyMinutes)}, 통째 소진) · 또는 회사 행사면 링크데이로 등록</span>
                    <div className="resolve-list">
                      {candidatesFor(l.earlyMinutes).length===0&&<span className="dim">충분한 블록이 없어요</span>}
                      {candidatesFor(l.earlyMinutes).map((b,bi)=>(<button key={b.id} className={"btn small "+(bi===0?"primary":"ghost")} onClick={()=>{onResolveEarly(l.id,b.id);setResolveEarlyFor(null);}}>{b.date} · {fmtDur(b.totalMin)}{bi===0?" · 추천":""}</button>))}
                      <button className="btn small ghost" onClick={()=>{onMarkLinkDay(l.id);setResolveEarlyFor(null);}}>링크데이 참석 (상계 없이)</button>
                    </div>
                  </div>
                ):<button className="btn small primary" onClick={()=>setResolveEarlyFor(l.id)}>사용한 추가근무 등록</button>
              ):<span className="chip s-no">미등록</span>}
            </div>
          ))}
        </div>
        {myOts.length>0&&(
          <div className="day-sec"><h4>내 추가근무 진행</h4>
            {myOts.map(o=>(
              <div key={o.id} className="day-row"><div><strong>{proj(o.projectId)?.name}</strong><span className="dim"> · {o.start}~{o.end} · {fmtDur(o.totalMin)} · {o.reason}</span></div><Chip status={o.status} /></div>
            ))}
          </div>
        )}
        <div className="day-sec"><h4>추가근무 (적립)</h4>
          {ots.length===0?<p className="dim">없음</p>:ots.map(o=>{ const rem=remainingOf(o.id);
            return (<div key={o.id} className="day-row"><div><strong>{member(o.requesterId)?.name}</strong> · {fmtDur(o.totalMin)}<span className="dim"> · {proj(o.projectId)?.name} · {o.reason}</span></div><span className={"chip "+(rem===0?"s-done":"s-ot")}>{rem===0?"사용 완료":"미사용"}</span></div>); })}
        </div>
        <div className="day-sec"><h4>시간 사용</h4>
          {uses.length===0?<p className="dim">없음</p>:uses.map(u=>(<div key={u.id} className="day-row"><div><strong>{member(u.requesterId)?.name}</strong> · {u.type} {fmtDur(u.minutes)}</div><span className={"chip "+(STATUS[u.status]?.cls||"")}>{STATUS[u.status]?.label||u.status}</span></div>))}
        </div>
      </div>
    </div>
  );
}

function ProfileModal({user,onSave,flash,onClose}){
  const [name,setName]=useState(user.name);
  const [dept,setDept]=useState(user.dept||""); const [email,setEmail]=useState(user.email||""); const [phone,setPhone]=useState(user.phone||""); const [title,setTitle]=useState(user.title||"");
  const [cur,setCur]=useState(""); const [np,setNp]=useState(""); const [np2,setNp2]=useState("");
  const [gwId,setGwId]=useState(""); const [gwPw,setGwPw]=useState("");
  useEffect(()=>{ (async()=>{ const c=await gwCredGet(user.id); setGwId(c.gwId||""); setGwPw(c.gwPw||""); })(); },[user.id]);
  const save=async()=>{
    const patch={};
    if(name.trim()&&name.trim()!==user.name) patch.name=name.trim();
    if(dept!==(user.dept||"")) patch.dept=dept.trim();
    if(email!==(user.email||"")) patch.email=email.trim();
    if(phone!==(user.phone||"")) patch.phone=phone.trim();
    if(title!==(user.title||"")) patch.title=title.trim();
    if(cur||np||np2){
      if((user.pw||"1")!==cur) return alert("현재 비밀번호가 일치하지 않아요.");
      if(!np) return alert("새 비밀번호를 입력해 주세요.");
      if(np!==np2) return alert("새 비밀번호 확인이 일치하지 않아요.");
      patch.pw=np;
    }
    await gwCredSet(user.id,{gwId:gwId.trim(),gwPw:gwPw});
    if(Object.keys(patch).length>0) onSave(patch);
    flash("정보를 변경했어요."); onClose();
  };
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-head"><h3>정보 변경</h3><button className="x" onClick={onClose}>✕</button></div>
        <div className="form">
          <Field label="이름"><input className="input" value={name} onChange={e=>setName(e.target.value)} /></Field>
          <Field label="직위 (보고 인사말용)"><input className="input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 연구원 / 프로" /></Field>
          <Field label="부서명"><input className="input" value={dept} onChange={e=>setDept(e.target.value)} placeholder="부서명" /></Field>
          <Field label="메일주소"><input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@linkgenesis.co.kr" autoComplete="off" /></Field>
          <Field label="휴대전화"><input className="input" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000" autoComplete="off" /></Field>
        </div>
        <p className="panel-sub mb">비밀번호 변경 (선택)</p>
        <div className="form">
          <Field label="현재 비밀번호"><input className="input" type="password" value={cur} onChange={e=>setCur(e.target.value)} /></Field>
          <Field label="새 비밀번호"><input className="input" type="password" value={np} onChange={e=>setNp(e.target.value)} /></Field>
          <Field label="새 비밀번호 확인" full><input className="input" type="password" value={np2} onChange={e=>setNp2(e.target.value)} /></Field>
        </div>
        <p className="panel-sub mb">그룹웨어 연동 <span className="dim">(이 기기에만 저장 · 근태 싱크에 사용)</span></p>
        <div className="form">
          <Field label="그룹웨어 로그인 ID"><input className="input" value={gwId} onChange={e=>setGwId(e.target.value)} placeholder="그룹웨어 아이디" autoComplete="off" /></Field>
          <Field label="그룹웨어 PW"><input className="input" type="password" value={gwPw} onChange={e=>setGwPw(e.target.value)} placeholder="그룹웨어 비밀번호" autoComplete="new-password" /></Field>
        </div>
        <div className="actions"><button className="btn primary" onClick={save}>저장</button><button className="btn ghost" onClick={onClose}>닫기</button></div>
      </div>
    </div>
  );
}

function OvertimeCard({o,member,proj,onLog,openMail}){
  const [start,setStart]=useState(o.start||"17:30"); const [end,setEnd]=useState(o.end||""); const preview=calcOvertime(start,end);
  return (
    <div className="reccard">
      <div className="reccard-top"><div><strong>{proj(o.projectId)?.name||"-"}</strong><span className="dim"> · {o.date}</span></div><Chip status={o.status} /></div>
      <p className="reccard-reason">{o.reason}</p>
      <div className="reccard-meta"><span>PL {member(o.plId)?.name||"-"}</span><span>스탭 {member(o.lgId)?.name||"-"}</span>{o.status==="completed"&&<span className="amt">{fmtDur(o.totalMin)} 적립</span>}</div>
      {o.status==="approved"&&(
        <div className="logbox"><p className="logbox-hint">근무 후 시작·종료 시각을 기록하세요. 17:30 이후만 인정됩니다.</p>
          <div className="time-row"><input className="input" type="time" value={start} onChange={e=>setStart(e.target.value)} /><span className="arrow">→</span><input className="input" type="time" value={end} onChange={e=>setEnd(e.target.value)} /><span className="preview">{preview>0?fmtDur(preview):"—"}</span></div>
          <div className="actions"><button className="btn small ghost" onClick={()=>openMail(mailStart({...o,start},proj))}>시작 메일</button><button className="btn small ghost" onClick={()=>openMail(mailEnd({...o,start,end,totalMin:preview},proj))}>종료 메일</button><button className="btn small primary" onClick={()=>onLog(o.id,start,end)}>적립 확정</button></div>
        </div>
      )}
    </div>
  );
}


function Approvals({items,member,project,onDecide}){

  return (
    <div className="panel"><h2 className="panel-title">승인함</h2><p className="panel-sub">현재 사용자가 처리할 요청만 보입니다.</p>
      <div className="cards">{items.map(r=>(
        <div key={r.id} className="reccard">
